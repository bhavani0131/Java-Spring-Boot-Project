name: Backend - Build, Scan & Deploy

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

jobs:
  backend-deploy:
    name: Build, Scan & Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      
      - name: Prepare EC2 Packages
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            sudo yum install -y git maven java-17-amazon-corretto

      - name: Clone / Pull Repository (Backend)
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/CloudTechDevOps/Java-springboot-project.git
            mkdir -p $APP_DIR
            cd $APP_DIR
            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

      - name: Build Maven Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests -U

      - name: Stop Old Backend Instance
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script_stop: false
          script: |
            PID=$(ps -ef | grep '[d]atastore-0.0.7.jar' | awk '{print $2}')
            
            if [ -z "$PID" ]; then
              echo "Application is not running."
              exit 0
            fi
            
            echo "Stopping PID: $PID"
            kill -15 $PID
            sleep 5
            
            if ps -p $PID > /dev/null 2>&1; then
              echo "Force killing PID: $PID"
              kill -9 $PID
            fi
            
            echo "Application stopped."

      - name: Start Backend Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            LOG_DIR=/var/log/app
            sudo mkdir -p $LOG_DIR
            sudo chown ec2-user:ec2-user $LOG_DIR
            cd /home/ec2-user/app/Java-springboot-project/backend/target
            nohup env \
              MYSQL_HOST=${{ secrets.DB_HOST }} \
              MYSQL_PORT=3306 \
              MYSQL_USERNAME=${{ secrets.DB_USERNAME }} \
              MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              LOG_FILE_PATH=$LOG_DIR/datastore.log \
              java -jar datastore-0.0.7.jar --server.port=8084 \
              > $LOG_DIR/nohup.out 2>&1 &

      - name: Wait for App Startup
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: sleep 15

      - name: Verify Backend Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            HEALTH=$(curl -s http://localhost:8084/actuator/health)
            echo "$HEALTH"
            [[ "$HEALTH" == *'"status":"UP"'* ]]
